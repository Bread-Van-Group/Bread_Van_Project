<!doctype html>
<html>
  <head>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Global Styling -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/customer/layout.css') }}"
    />

    <!--Leaflet Routing Machine CSS and JS-->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% block head %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body>
    <div class="page-container" id="content">
      <!-- Top bar -->

      <!-- Page content -->
      {% block content %}{% endblock %}

      <!-- Navigation Bar -->
      <div class="nav-container">
        <a
          id="home"
          class="nav-btn"
          href="{{ url_for('customer_views.customer_homepage') }}"
          ><i class="fa-solid fa-home"></i><span>Home</span></a
        >
        <a
          id="store"
          class="nav-btn"
          href="{{ url_for('customer_views.customer_store') }}"
          ><i class="fa-solid fa-store"></i><span>Store</span></a
        >
        <a
          id="schedule"
          class="nav-btn"
          href="{{ url_for('customer_views.customer_schedule') }}"
          ><i class="fa-solid fa-calendar"></i><span>Schedule</span></a
        >
        <a class="nav-btn" href="{{ url_for('auth_views.logout') }}"
          ><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a
        >
      </div>
    </div>

    <!--Web Socket Code-->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = message;
        document.body.appendChild(toast);

        setTimeout(() => toast.classList.add("show"), 10);
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      }

      document.addEventListener("DOMContentLoaded", function () {
        const params = new URLSearchParams(window.location.search);
        const message = params.get("message");
        if (message) showToast(message);
      });
    </script>
    <!--Navbar Code -->
    <script>
      const currentURL = "{{ request.path  }}";
      var id = "";

      if (currentURL == String("/customer/checkout")) {
        id = "store";
      } else {
        id = currentURL.slice(currentURL.lastIndexOf("/") + 1);
      }

      const currentNavBtn = document.querySelector(`#${id}`);

      currentNavBtn.classList.add("active");
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>

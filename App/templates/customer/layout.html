<!doctype html>
<html>
  <head>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Global Styling -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/customer/layout.css') }}"
    />

    <!--Leaflet Routing Machine CSS and JS-->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!--Leaflet Marker Clustering-->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% block head %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body>
    <div class="page-container" id="content">
      <!-- Top bar -->

      <!-- Page content -->
      {% block content %}{% endblock %}

      <!-- Navigation Bar -->
      <div class="nav-container">
        <a
          id="home"
          class="nav-btn"
          href="{{ url_for('customer_views.customer_homepage') }}"
          ><i class="fa-solid fa-home"></i><span>Home</span></a
        >
        <button
          id="store"
          class="nav-btn"
          style="border: none"
          onclick="goToStorePage()"
        >
          <i class="fa-solid fa-store"></i><span>Store</span>
        </button>
        <a
          id="schedule"
          class="nav-btn"
          href="{{ url_for('customer_views.customer_schedule') }}"
          ><i class="fa-solid fa-calendar"></i><span>Schedule</span></a
        >
        <a class="nav-btn" href="{{ url_for('auth_views.logout') }}"
          ><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a
        >
      </div>
    </div>
    <!--Constants Across Customer Side-->
    <script src="{{url_for('static', filename = 'js/customer/constants.js')}}"></script>

    <!--Web Socket Code-->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{url_for('static', filename='js/reverse_geocoder.js')}}"></script>
    <!--Location Retriever Code For Customer and Driver-->
    <script src="{{url_for('static', filename='js/customer/location_retriever.js')}}"></script>
    <!--Flash Message Code-->
    <script src="{{url_for('static', filename='js/handle_flash_message.js')}}"></script>

    <!--OSRM Routing Code-->
    <script src="{{url_for('static', filename='js/handle_routing.js')}}"></script>

    <!--SERVER SIDE RELIANT CODE-->

    <!--Navbar Code -->
    <script>
      const currentURL = "{{ request.path  }}";
      var id = "";

      if (currentURL == String("/customer/checkout")) {
        id = "store";
      } else {
        id = currentURL.slice(currentURL.lastIndexOf("/") + 1);
      }

      const currentNavBtn = document.querySelector(`#${id}`);

      currentNavBtn.classList.add("active");
    </script>

    <!--Get Route And Store For Customer For Later Checks-->
    <script>
      //Get Route from API
      //IT IS ASSUMED A ROUTE WILL HAVE A START AND END AND MORE THAN TWO POINTS

      let routingControl = null;
      let routeCoordinates = [];

      async function getBakeryRoute() {
        const res = await fetch("/api/customer/route");
        const { route_id, stops } = await res.json();

        let waypoints = [...stops.map((stop) => L.latLng(stop.lat, stop.lng))];

        routingControl = buildRoute(waypoints, routingControl);
      }

      function isOnVanRoute(markerLatLng) {
        if (routeCoordinates.length === 0) return false;

        return routeCoordinates.some((coord) => {
          return markerLatLng.distanceTo(coord) <= ROUTE_PROXIMITY_RADIUS;
        });
      }

      (async () => {
        await getBakeryRoute();
      })();
    </script>

    {% block scripts %}{% endblock %}
    <!--Code To Determine Whether Customer Can Access Store Page-->
    <script>
      async function goToStorePage() {
        let authorized = false;
        let redirectUrl = null;

        if (vanArrivalTime == null) {
          redirectUrl =
            "{{ url_for('customer_views.customer_homepage', message='The Bread Van Is Not Operational At The Moment, Come Back Later') }}";
        } else if (!isOnVanRoute(customerMarker.getLatLng())) {
          redirectUrl =
            "{{ url_for('customer_views.customer_homepage', message='The Bread Van Is Not Servicing Your Area Currently') }}";
        } else if (!breadVanIsClose()) {
          redirectUrl =
            "{{ url_for('customer_views.customer_homepage', message='The Bread Van Is Not Nearby, Come Back Later') }}";
        } else {
          authorized = true;
        }

        if (!authorized) {
          window.location.href = redirectUrl;
          return;
        }

        // Request server-side authorization
        const response = await fetch(
          "{{ url_for('customer_views.authorize_store') }}",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ authorized: true }),
          },
        );

        const data = await response.json();
        if (response.ok) {
          window.location.href = data.redirect;
        }
      }
    </script>
  </body>
</html>
